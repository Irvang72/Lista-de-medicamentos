<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Medicamentos - Irving</title>
    <style>
        :root {
            --bg: rgba(0, 0, 0, 0);
            --card: rgba(255, 255, 255, 0.08); 
            --accent: #007bff;
            --text-main: #ffffff;
            --text-dim: #b0b0b0;
            --border: rgba(255, 255, 255, 0.15);
            --antibiotico: #ff4d4d;
            --color-patente: #00ff88;  /* Verde Neón */
            --color-generico: #4da3ff;  /* Azul Neón */
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            color: var(--text-main);
            background-color: #00000000; 
        }

        /* VIDEO DE FONDO */
        .video-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden; z-index: -1;
        }

        #background-video {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.4);
        }

        /* CONTENIDO PRINCIPAL */
        .main-content {
            display: flex; flex-direction: column; align-items: center;
            padding: 15px; min-height: 100vh; position: relative; z-index: 1;
        }

        .header-sticky {
            position: sticky; top: 0; width: 100%; max-width: 500px;
            padding: 10px 0; z-index: 100;
        }

        #buscador {
            width: 100%; padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 12px; color: white;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            outline: none; margin-bottom: 10px; box-sizing: border-box;
        }

        /* TARJETAS */
        #lista-meds { width: 100%; max-width: 500px; }

        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 15px; padding: 20px; margin-bottom: 20px;
            cursor: pointer; transition: 0.3s;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .card:hover { transform: translateY(-3px); background: rgba(255, 255, 255, 0.12); }
        .card.requiere-receta { border-left: 5px solid var(--antibiotico); }
        .card h3 { margin: 0; color: #fff; font-size: 20px; }

        .tipo-tag-card {
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* MODAL */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000; display: none; justify-content: center; align-items: center;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.07);
            width: 90%; max-width: 400px; padding: 25px;
            border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center; color: white;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            animation: aparecer 0.3s ease-out;
        }

        @keyframes aparecer {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-overlay.active { display: flex; }

        .modal-img { 
            display: block;
            margin: 15px auto; 
            width: 100%; 
            max-height: 200px; 
            object-fit: contain; 
            background: white; 
            border-radius: 15px; 
            padding: 10px;
            box-sizing: border-box;
        }

        .info-grid {
            text-align: left; display: grid; gap: 10px; margin-top: 15px;
        }

        .info-item b { color: var(--accent); font-size: 12px; text-transform: uppercase; display: block; }
        .info-item span { font-size: 15px; color: #eee; }

        .modal-close { 
            background: var(--accent); border: none; color: white; 
            padding: 12px; border-radius: 12px; margin-top: 20px; 
            cursor: pointer; width: 100%; font-weight: bold; font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video autoplay muted loop playsinline id="background-video">
            <source src="https://moewalls.com/wp-content/uploads/preview/2025/liquid-blue-ocean-preview.webm" type="video/mp4">
        </video>
    </div>

    <div class="main-content">
        <div class="header-sticky">
            <input type="text" id="buscador" placeholder="🔎 Buscar medicamento..." onkeyup="filtrar()">
        </div>
        <div id="lista-meds">
            <p style="text-align: center;">Cargando catálogo...</p>
        </div>
    </div>

    <div class="modal-overlay" id="modal" onclick="cerrarModal(event)">
        <div class="modal-content">
            <h2 id="m-nombre" style="margin:0; font-size: 22px;"></h2>
            <p id="m-tipo" style="font-weight:bold; margin-top:5px; font-size: 14px;"></p>
            <img id="m-img" class="modal-img" src="" alt="Producto">
            <div class="info-grid">
                <div class="info-item"><b>Sustancia</b><span id="m-sust"></span></div>
                <div class="info-item"><b>Laboratorio</b><span id="m-lab"></span></div>
                <div class="info-item"><b>Contenido</b><span id="m-cant"></span></div>
                <div class="info-item"><b>Código EAN</b><span id="m-ean"></span></div>
                <div class="info-item"><b>Venta Protegida</b><span id="m-venta"></span></div>
            </div>
            <button class="modal-close" onclick="document.getElementById('modal').classList.remove('active')">Volver al catálogo</button>
        </div>
    </div>

    <script>
        const URL_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRt6zIpSJpUR8TzkoTNlXz87b68s-dTgxEl7AZykJVd_KKYyCb9zKmi5gHV_6S7MZa8Akr_TPeWVllV/pub?output=csv"; 
        let medicamentos = [];

        async function cargarInventario() {
            try {
                const response = await fetch(URL_CSV + "&cb=" + Date.now());
                const data = await response.text();
                const filas = data.split(/\r?\n/).slice(1); 
                medicamentos = filas.map(linea => {
                    const col = linea.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (col.length < 3) return null;
                    return {
                        nombre: col[0]?.replace(/"/g, '').trim(),
                        sustancia: col[1]?.replace(/"/g, '').trim(),
                        codigo: col[2]?.trim(),
                        unidades: col[3]?.trim() || "N/A",
                        tipoVenta: col[4]?.trim() || "No",
                        patente: col[6]?.trim() || "Genérico",
                        laboratorio: col[7]?.trim() || "N/A",
                        img: col[8]?.trim() || "https://via.placeholder.com/150?text=Sin+Foto"
                    };
                }).filter(m => m !== null);

                // --- ORDEN ALFABÉTICO REINSTALADO ---
                medicamentos.sort((a, b) => a.nombre.localeCompare(b.nombre));
                
                renderizar(medicamentos);
            } catch (e) { console.error(e); }
        }

        function renderizar(lista) {
            const contenedor = document.getElementById('lista-meds');
            contenedor.innerHTML = lista.map(m => {
                const esPatente = m.patente.toLowerCase().includes("patente");
                const colorTexto = esPatente ? 'var(--color-patente)' : 'var(--color-generico)';
                return `
                <div class="card" onclick="abrirModal('${m.codigo}')">
                    <div style="display:flex; justify-content: space-between; margin-bottom:8px;">
                        <div style="font-size:10px; color:rgba(255,255,255,0.5);">${m.laboratorio}</div>
                        <span class="tipo-tag-card" style="color: ${colorTexto};">${m.patente}</span>
                    </div>
                    <h3>${m.nombre}</h3>
                    <span style="color:#4da3ff; font-size:13px; font-weight:bold;">${m.sustancia}</span>
                </div>
            `}).join('');
        }

        function abrirModal(ean) {
            const med = medicamentos.find(m => m.codigo === ean);
            if(!med) return;
            const esPatente = med.patente.toLowerCase().includes("patente");
            const colorModal = esPatente ? 'var(--color-patente)' : 'var(--color-generico)';
            document.getElementById('m-nombre').innerText = med.nombre;
            document.getElementById('m-sust').innerText = med.sustancia;
            document.getElementById('m-lab').innerText = med.laboratorio;
            document.getElementById('m-cant').innerText = med.unidades;
            document.getElementById('m-ean').innerText = med.codigo;
            document.getElementById('m-venta').innerText = med.tipoVenta;
            const tipoEl = document.getElementById('m-tipo');
            tipoEl.innerText = med.patente.toUpperCase();
            tipoEl.style.color = colorModal;
            document.getElementById('m-img').src = med.img;
            document.getElementById('modal').classList.add('active');
        }

        function cerrarModal(e) { if(e.target.id === 'modal') document.getElementById('modal').classList.remove('active'); }

        function filtrar() {
            const busqueda = document.getElementById('buscador').value.toLowerCase();
            const filtrados = medicamentos.filter(m => 
                m.nombre.toLowerCase().includes(busqueda) || 
                m.sustancia.toLowerCase().includes(busqueda)
            );
            // El orden se mantiene porque ya ordenamos el array original
            renderizar(filtrados);
        }

        cargarInventario();
    </script>
</body>
</html>
